<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scheletul Uman 3D</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>
</head>

<body>

<div id="loading">
    <div class="loader"></div>
    <h2>Se încarcă modelul 3D...</h2>
</div>

<div id="sidebar">

    <h1>🦴 Scheletul Uman</h1>

    <p>
        Corpul uman adult conține aproximativ
        <b>206 oase</b>.
    </p>

    <div class="buttons">

        <button onclick="showBone('craniu')">Craniu</button>

        <button onclick="showBone('coloana')">
            Coloană vertebrală
        </button>

        <button onclick="showBone('coaste')">
            Coaste
        </button>

        <button onclick="showBone('stern')">
            Stern
        </button>

        <button onclick="showBone('bazin')">
            Bazin
        </button>

        <button onclick="showBone('femur')">
            Femur
        </button>

        <button onclick="showBone('tibie')">
            Tibie
        </button>

    </div>

    <div id="description">

        <h2>Bine ai venit!</h2>

        <p>
            Apasă pe unul dintre butoane pentru a afla informații despre principalele oase ale corpului uman.
        </p>

    </div>

</div>

<div id="viewer"></div>

<script type="module" src="script.js"></script>

</body>
</html>
